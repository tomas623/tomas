<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crear contraseña nueva · LegalPacers</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" href="/static/logo-icon.png">
<style>
:root{
  --bg:#030712; --surface:#0f172a; --surface-2:#1e293b;
  --border:#334155; --border-soft:#1f2a40;
  --text:#f8fafc; --text-soft:#e2e8f0; --text-muted:#94a3b8; --text-dim:#64748b;
  --blue:#1b6ef3; --blue-dark:#1656c4; --blue-soft:rgba(27,110,243,.12);
  --green:#10b981; --green-soft:rgba(16,185,129,.12);
  --red:#ef4444; --red-soft:rgba(239,68,68,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;line-height:1.5}
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:16px;padding:36px;max-width:420px;width:100%;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
.logo{font-weight:800;letter-spacing:.5px;font-size:14px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase}
.logo .accent{color:var(--blue)}
h1{font-size:24px;font-weight:800;margin-bottom:6px;color:#fff}
.sub{font-size:13.5px;color:var(--text-muted);margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:6px;margin-top:14px}
input{width:100%;padding:12px 14px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,110,243,.18)}
button{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-top:20px;transition:background .15s}
button:hover{background:var(--blue-dark)}
button:disabled{opacity:.5;cursor:not-allowed}
.alert{padding:11px 14px;border-radius:8px;font-size:13.5px;margin-bottom:14px}
.alert.bad{background:var(--red-soft);color:#fca5a5;border:1px solid rgba(239,68,68,.35)}
.alert.ok{background:var(--green-soft);color:#6ee7b7;border:1px solid rgba(16,185,129,.35)}
.muted{font-size:12px;color:var(--text-dim);text-align:center;margin-top:16px}
.muted a{color:#60a5fa;text-decoration:none}
</style>
</head>
<body>

<div class="card">
  <div class="logo">LEGAL<span class="accent">PACERS</span></div>
  <h1 id="title">Crear contraseña nueva</h1>
  <p class="sub" id="sub">Elegí una contraseña nueva para tu cuenta. Mínimo 8 caracteres.</p>

  <div id="alert" class="alert bad" hidden></div>

  <form id="form" hidden>
    <label for="pw1">Nueva contraseña</label>
    <input id="pw1" type="password" autocomplete="new-password" required minlength="8" placeholder="Mínimo 8 caracteres">

    <label for="pw2">Confirmar contraseña</label>
    <input id="pw2" type="password" autocomplete="new-password" required minlength="8" placeholder="Otra vez, para confirmar">

    <button id="submit" type="submit">Guardar contraseña</button>
  </form>

  <p class="muted" id="footer-link">¿Volviste a recordarla? <a href="/cliente">Iniciar sesión</a></p>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');
const $alert = document.getElementById('alert');
const $form = document.getElementById('form');
const $submit = document.getElementById('submit');
const $title = document.getElementById('title');
const $sub = document.getElementById('sub');

function showError(msg) {
  $alert.className = 'alert bad';
  $alert.textContent = msg;
  $alert.hidden = false;
}
function showOk(msg) {
  $alert.className = 'alert ok';
  $alert.textContent = msg;
  $alert.hidden = false;
}

if (!token) {
  showError('Falta el token. Pedí un link nuevo desde "Olvidé mi contraseña".');
  document.getElementById('footer-link').innerHTML = '<a href="/cliente">Volver al login</a>';
} else {
  $form.hidden = false;
}

$form?.addEventListener('submit', async (e) => {
  e.preventDefault();
  $alert.hidden = true;
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  if (pw1.length < 8) return showError('Mínimo 8 caracteres.');
  if (pw1 !== pw2) return showError('Las contraseñas no coinciden.');

  $submit.disabled = true;
  $submit.textContent = 'Guardando…';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pw1 }),
    }).then(res => res.json());
    if (!r.ok) {
      showError(r.error || 'No pudimos resetear la contraseña.');
      $submit.disabled = false;
      $submit.textContent = 'Guardar contraseña';
      return;
    }
    $title.textContent = '¡Listo!';
    $sub.textContent = 'Tu contraseña fue actualizada.';
    $form.hidden = true;
    showOk('Ya podés iniciar sesión con tu contraseña nueva.');
    document.getElementById('footer-link').innerHTML = '<a href="/cliente">Ir al portal cliente</a> · <a href="/admin">Ir al panel admin</a>';
  } catch (err) {
    showError('Error de red. Probá de nuevo.');
    $submit.disabled = false;
    $submit.textContent = 'Guardar contraseña';
  }
});
</script>

</body>
</html>
