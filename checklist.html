<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Evaluá el nivel de riesgo legal de tu startup en 2 minutos — Legal Pacers">
  <title>Checklist de Riesgo Legal — Legal Pacers</title>

  <style>
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialRegular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialBold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialBlack.otf') format('opentype'); font-weight: 900; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialLight.otf') format('opentype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialDemibold.otf') format('opentype'); font-weight: 600; font-display: swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --navy: #001540;
      --blue: #016FFB;
      --blue-light: #3B8EFF;
      --blue-glow: rgba(1,111,251,0.15);
      --white: #FFFFFF;
      --off-white: #F4F6FA;
      --gray-100: #E8ECF4;
      --gray-300: #A0AABF;
      --gray-500: #5A6478;
      --gray-700: #2D3447;
      --red: #E63946;
      --green: #2CB67D;
      --amber: #F4A438;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-pill: 999px;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.3);
      --transition: 200ms ease;
    }

    body {
      font-family: 'Mundial', system-ui, sans-serif;
      background: var(--navy);
      color: var(--gray-700);
      line-height: 1.6;
      font-weight: 400;
      min-height: 100vh;
    }

    a { color: var(--blue); text-decoration: none; }
    button { font-family: inherit; }

    /* APP CONTAINER */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* SCREEN TRANSITIONS */
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-28px); }
      to   { opacity: 1; transform: none; }
    }
    .screen-in-right { animation: slideInRight 320ms cubic-bezier(.4,0,.2,1); }
    .screen-in-left  { animation: slideInLeft  320ms cubic-bezier(.4,0,.2,1); }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.75rem;
      border-radius: var(--radius-pill);
      font-family: 'Mundial', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 16px rgba(1,111,251,0.35);
    }
    .btn-primary:hover:not(:disabled) { background: var(--blue-light); }
    .btn-ghost {
      background: transparent;
      color: var(--gray-500);
    }
    .btn-ghost:hover { color: var(--navy); transform: translateY(-2px); }
    .btn-full { width: 100%; }

    /* SCREEN 0 — GATE */
    .gate {
      flex: 1;
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .gate-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .gate-logo { margin-bottom: 1.75rem; }
    .gate-logo img { height: 42px; width: auto; }
    .gate-logo .logo-text {
      font-size: 1.3rem;
      color: var(--navy);
      font-weight: 900;
      display: none;
    }
    .gate-card h1 {
      font-size: 1.65rem;
      font-weight: 900;
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }
    .gate-card h1 span { color: var(--blue); }
    .gate-card .gate-subtitle {
      color: var(--gray-500);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.55;
    }
    .gate-form { display: flex; flex-direction: column; gap: 0.85rem; }
    .input-field {
      padding: 0.95rem 1.1rem;
      border: 1.5px solid var(--gray-100);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--gray-700);
      background: var(--off-white);
      transition: border-color var(--transition), background var(--transition);
      width: 100%;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--white);
    }
    .input-error {
      color: var(--red);
      font-size: 0.8rem;
      text-align: left;
      margin-top: -0.35rem;
      min-height: 1rem;
    }
    .gate-legal {
      font-size: 0.75rem;
      color: var(--gray-300);
      margin-top: 1.25rem;
      line-height: 1.5;
    }
    .gate-legal a { color: var(--gray-500); text-decoration: underline; }

    /* STEP SCREEN (pasos 1-5) */
    .step {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--off-white);
      min-height: 100vh;
    }

    .step-header {
      background: var(--navy);
      color: #fff;
      padding: 1rem clamp(1rem, 4vw, 3rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .step-header-logo img {
      height: 28px;
      width: auto;
      filter: brightness(0) invert(1);
    }
    .step-header-logo .logo-text {
      color: #fff;
      font-weight: 900;
      font-size: 1rem;
      display: none;
    }
    .step-header-counter {
      font-size: 0.82rem;
      font-weight: 600;
      opacity: 0.7;
      letter-spacing: 0.04em;
    }

    .step-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
      padding: 1.25rem 1rem;
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
    }
    .step-dot {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gray-100);
      color: var(--gray-500);
      font-size: 0.82rem;
      font-weight: 700;
      transition: background var(--transition), color var(--transition), transform var(--transition);
      flex-shrink: 0;
    }
    .step-dot.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 12px rgba(1,111,251,0.35);
      transform: scale(1.1);
    }
    .step-dot.done { background: var(--green); color: #fff; }
    .step-dot-line {
      width: 20px;
      height: 2px;
      background: var(--gray-100);
      transition: background var(--transition);
    }
    .step-dot-line.done { background: var(--green); }

    .step-body {
      flex: 1;
      padding: 2.5rem clamp(1rem, 4vw, 3rem) 2rem;
    }
    .step-inner { max-width: 680px; margin: 0 auto; }

    .step-title {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 2rem;
    }
    .step-title-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--blue);
      color: #fff;
      font-size: 1.35rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-title-text h2 {
      font-size: clamp(1.3rem, 3vw, 1.6rem);
      font-weight: 900;
      color: var(--navy);
      line-height: 1.2;
    }
    .step-title-text p {
      font-size: 0.88rem;
      color: var(--gray-500);
      margin-top: 0.2rem;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }
    .item-card {
      background: var(--white);
      border: 2px solid var(--gray-100);
      border-radius: var(--radius-md);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), transform var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      user-select: none;
    }
    .item-card:hover {
      border-color: var(--blue);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(1,111,251,0.08);
    }
    .item-card.checked {
      border-color: var(--green);
      background: rgba(44,182,125,0.06);
    }
    .item-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--gray-300);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      background: var(--white);
      color: transparent;
      font-size: 0.9rem;
      font-weight: 900;
    }
    .item-card.checked .item-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: var(--gray-700);
      line-height: 1.45;
    }

    .step-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      max-width: 680px;
      margin: 0 auto;
    }
    .step-nav .btn-ghost {
      background: var(--white);
      border: 1.5px solid var(--gray-100);
    }

    /* RESULTS SCREEN */
    .results {
      flex: 1;
      min-height: 100vh;
      background: var(--navy);
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .results-header {
      padding: 1rem clamp(1rem, 4vw, 3rem);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .results-logo img { height: 28px; width: auto; filter: brightness(0) invert(1); }
    .results-logo .logo-text { color: #fff; font-weight: 900; font-size: 1rem; display: none; }
    .btn-ghost-light {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.55rem 1.1rem;
      font-size: 0.85rem;
      border-radius: var(--radius-pill);
      cursor: pointer;
      font-weight: 700;
      transition: color var(--transition), border-color var(--transition), transform var(--transition);
    }
    .btn-ghost-light:hover { color: #fff; border-color: #fff; transform: translateY(-2px); }

    .results-inner {
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem clamp(1rem, 4vw, 3rem) 4rem;
      width: 100%;
    }

    @keyframes drawRing {
      from { stroke-dashoffset: 326.7; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }

    .score-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .score-ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
    }
    .score-ring { width: 100%; height: 100%; }
    .score-ring__bg {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 10;
    }
    .score-ring__fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 326.7;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      animation: drawRing 1400ms cubic-bezier(.4,0,.2,1) both;
    }
    .score-ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-ring-label span {
      font-size: 2.75rem;
      font-weight: 900;
      line-height: 1;
      animation: fadeUp 600ms 400ms both;
    }
    .score-ring-label small {
      font-size: 0.7rem;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
      animation: fadeUp 600ms 500ms both;
    }

    .risk-badge {
      padding: 0.6rem 1.5rem;
      border-radius: var(--radius-pill);
      font-weight: 700;
      font-size: 0.95rem;
      animation: fadeUp 600ms 700ms both;
    }
    .risk-badge--critical { background: rgba(230,57,70,0.18);  color: #ff8b92; }
    .risk-badge--high     { background: rgba(244,164,56,0.18); color: #ffcb81; }
    .risk-badge--medium   { background: rgba(59,142,255,0.18); color: #7fb4ff; }
    .risk-badge--low      { background: rgba(44,182,125,0.18); color: #6fd5a7; }

    .results-h1 {
      text-align: center;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 900;
      margin-bottom: 0.4rem;
      animation: fadeUp 600ms 800ms both;
    }
    .results-h1 span { color: var(--blue-light); }
    .results-subtitle {
      text-align: center;
      opacity: 0.75;
      margin-bottom: 2.5rem;
      font-size: 1rem;
      animation: fadeUp 600ms 900ms both;
    }

    .risks-block { animation: fadeUp 600ms 1000ms both; }
    .risks-block h3 {
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.75;
    }
    .risks-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }
    .risks-list li {
      padding: 0.9rem 1.1rem;
      background: rgba(230,57,70,0.12);
      border-left: 3px solid var(--red);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .risks-list li strong {
      display: block;
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      font-weight: 600;
    }

    .all-clear-card {
      padding: 2rem;
      background: rgba(44,182,125,0.15);
      border: 1px solid rgba(44,182,125,0.35);
      border-radius: var(--radius-md);
      text-align: center;
      color: #6fd5a7;
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 2rem;
      animation: fadeUp 600ms 1000ms both;
    }

    .disclaimer-box {
      background: rgba(244,164,56,0.1);
      border-left: 3px solid var(--amber);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      color: rgba(255,255,255,0.85);
      animation: fadeUp 600ms 1100ms both;
    }
    .disclaimer-box strong { color: var(--amber); }

    .cta-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      animation: fadeUp 600ms 1200ms both;
    }
    .cta-box h3 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .cta-box p {
      opacity: 0.75;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    /* WHATSAPP FLOAT */
    .whatsapp-float {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #25D366;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      transition: transform var(--transition);
    }
    .whatsapp-float:hover { transform: scale(1.1); color: #fff; }
    .whatsapp-float svg { width: 28px; height: 28px; }

    /* MOBILE */
    @media (max-width: 600px) {
      .gate-card { padding: 2.25rem 1.5rem; }
      .gate-card h1 { font-size: 1.4rem; }
      .step-body { padding: 1.75rem 1rem 1.5rem; }
      .step-title { margin-bottom: 1.5rem; }
      .step-title-icon { width: 40px; height: 40px; font-size: 1.15rem; }
      .step-dot { width: 28px; height: 28px; font-size: 0.75rem; }
      .step-dot-line { width: 14px; }
      .items-list { gap: 0.6rem; margin-bottom: 1.75rem; }
      .item-card { padding: 0.95rem 1rem; }
      .step-nav .btn { padding: 0.8rem 1.1rem; font-size: 0.88rem; }
      .results-inner { padding: 2rem 1rem 3rem; }
      .score-ring-wrap { width: 150px; height: 150px; }
      .score-ring-label span { font-size: 2.25rem; }
      .cta-box { padding: 1.5rem 1.25rem; }
      .cta-box h3 { font-size: 1.15rem; }
    }
  </style>
</head>

<div id="app"></div>

<script>
  /* ============================================================
   * DATA — mismas categorías e ítems del checklist original
   * ============================================================ */
  const CATS = [
    { name:'Constitución',          icon:'🏗️', step:1 },
    { name:'Propiedad Intelectual', icon:'🔐', step:2 },

    { name:'Laboral y Contratos',   icon:'👥', step:4 },

  const ITEMS = [
    { id:'c1',  step:1, cat:'Constitución',          text:'Tengo una sociedad legalmente constituida',                                       risk:'Responsabilidad ilimitada sobre tu patrimonio personal', weight:2 },

    { id:'ip2', step:2, cat:'Propiedad Intelectual', text:'Los contratos con freelancers/empleados incluyen cesión de IP',                    risk:'IP de terceros dentro de tu producto',                   weight:3 },
    { id:'ip3', step:2, cat:'Propiedad Intelectual', text:'La marca está registrada o en proceso',                                            risk:'Terceros pueden usar tu marca sin consecuencias',        weight:2 },
    { id:'ip4', step:2, cat:'Propiedad Intelectual', text:'No usás código open source con licencias restrictivas (GPL) sin análisis',         risk:'Contaminación de licencia que afecta al producto',       weight:2 },
    { id:'p1',  step:3, cat:'Privacidad y Datos',    text:'Tenés Términos y Condiciones propios (no copiados de otro servicio)',              risk:'Sin defensa contractual ante reclamos de usuarios',      weight:2 },
    { id:'p2',  step:3, cat:'Privacidad y Datos',    text:'Tenés Política de Privacidad actualizada (LPDP / GDPR)',                           risk:'Multas y sanciones regulatorias',                        weight:3 },
    { id:'p3',  step:3, cat:'Privacidad y Datos',    text:'Tenés mecanismo de consentimiento para cookies y datos',                           risk:'Incumplimiento regulatorio desde el día 1',              weight:2 },
    { id:'p4',  step:3, cat:'Privacidad y Datos',    text:'Los datos de usuarios están alojados conforme a la normativa aplicable',           risk:'Transferencia internacional no autorizada',              weight:2 },
    { id:'l1',  step:4, cat:'Laboral y Contratos',   text:'Los empleados y contratistas tienen contratos firmados',                           risk:'Pasivo laboral oculto que aparece al crecer',            weight:2 },
    { id:'l2',  step:4, cat:'Laboral y Contratos',   text:'Los contratos con clientes incluyen cláusulas de limitación de responsabilidad',   risk:'Responsabilidad ilimitada ante cualquier incidente',     weight:3 },
    { id:'l3',  step:4, cat:'Laboral y Contratos',   text:'Los NDAs con partners y empleados están vigentes',                                 risk:'Filtración de información sin consecuencias legales',    weight:2 },
    { id:'i1',  step:5, cat:'Inversión',             text:'Tenés un cap table actualizado y documentado',                                     risk:'Disputas de equity con inversores actuales o futuros',   weight:2 },
    { id:'i2',  step:5, cat:'Inversión',             text:'Entendés la diferencia entre SAFE, convertible note y equity round',               risk:'Dilución inesperada en tu próxima ronda',                weight:2 },
  ];

  /* ============================================================
   * STATE
   * ============================================================ */
  let currentStep = 0;                    // 0 = gate, 1-5 = pasos, 6 = resultados
  let userData    = { name: '', email: '' };
  let direction   = 'forward';            // 'forward' | 'back' — dirección del slide
  const checked   = new Set();

  /* ============================================================
   * HELPERS
   * ============================================================ */
  const $app = () => document.getElementById('app');

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
  }

  /* ============================================================
   * NAVIGATION
   * ============================================================ */
  function goNext() {
    if (currentStep >= 6) return;
    direction = 'forward';
    currentStep++;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function goBack() {
    if (currentStep <= 0) return;
    direction = 'back';
    currentStep--;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  /* ============================================================
   * SCREEN 0 — GATE (nombre + email)
   * ============================================================ */
  function renderGate() {
    return `
      <div class="gate">
        <div class="gate-card">
          <div class="gate-logo">
            <img src="legalpacers-logos-01.png" alt="Legal Pacers"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'">
            <span class="logo-text">Legal<strong>Pacers</strong></span>
          </div>

          <h1>Tu <span>diagnóstico legal</span> en 2 minutos</h1>
          <p class="gate-subtitle">
            Respondé 17 preguntas rápidas y descubrí los riesgos legales
            que más impactan a tu startup.
          </p>

          <form class="gate-form" id="gateForm" novalidate>
            <input
              type="text"
              id="gateName"
              class="input-field"
              placeholder="Tu nombre"
              autocomplete="given-name"
              value="${escapeHtml(userData.name)}"
              required>

            <input
              type="email"
              id="gateEmail"
              class="input-field"
              placeholder="Tu email"
              autocomplete="email"
              value="${escapeHtml(userData.email)}"
              required>

            <div class="input-error" id="gateError"></div>

            <button type="submit" class="btn btn-primary btn-full">
              Empezar el diagnóstico →
            </button>
          </form>

          <p class="gate-legal">
            Al continuar aceptás recibir el resultado por email. No te vamos a spamear.
          </p>
        </div>
      </div>
    `;
  }

  function bindGate() {
    const form  = document.getElementById('gateForm');
    const nameI = document.getElementById('gateName');
    const mailI = document.getElementById('gateEmail');
    const errEl = document.getElementById('gateError');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name  = nameI.value.trim();
      const email = mailI.value.trim();

      if (!name) { errEl.textContent = 'Ingresá tu nombre.'; nameI.focus(); return; }
      if (!isValidEmail(email)) { errEl.textContent = 'Ingresá un email válido.'; mailI.focus(); return; }

      userData.name  = name;
      userData.email = email;
      errEl.textContent = '';
      goNext();
    });

    setTimeout(() => nameI.focus(), 50);
  }

  /* ============================================================
   * SCREENS 1-5 — STEP (categoría + items)
   * ============================================================ */
  function renderStep(step) {
    const cat   = CATS.find(c => c.step === step);
    const items = ITEMS.filter(i => i.step === step);
    const isLast = step === 5;

    const dots = CATS.map((c, idx) => {
      const cls = c.step === step ? 'active' : c.step < step ? 'done' : '';
      const label = c.step < step ? '✓' : c.step;
      const dot = `<div class="step-dot ${cls}" aria-label="Paso ${c.step}">${label}</div>`;
      const line = idx < CATS.length - 1
        ? `<div class="step-dot-line ${c.step < step ? 'done' : ''}"></div>`
        : '';
      return dot + line;
    }).join('');

    const cards = items.map(i => `
      <div class="item-card ${checked.has(i.id) ? 'checked' : ''}"
           data-id="${i.id}"
           onclick="toggleItem('${i.id}')"
           role="checkbox"
           tabindex="0"
           aria-checked="${checked.has(i.id)}">
        <div class="item-check" aria-hidden="true">✓</div>
        <div class="item-text">${escapeHtml(i.text)}</div>
      </div>
    `).join('');

    return `
      <div class="step">
        <div class="step-header">
          <div class="step-header-logo">
            <img src="legalpacers-logos-01.png" alt="Legal Pacers"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'">
            <span class="logo-text">Legal<strong>Pacers</strong></span>
          </div>
          <div class="step-header-counter">Paso ${step} de 5</div>
        </div>

        <div class="step-dots">${dots}</div>

        <div class="step-body">
          <div class="step-inner">
            <div class="step-title">
              <div class="step-title-icon" aria-hidden="true">${cat.icon}</div>
              <div class="step-title-text">
                <h2>${escapeHtml(cat.name)}</h2>
                <p>Marcá lo que ya tenés resuelto.</p>
              </div>
            </div>

            <div class="items-list">${cards}</div>

            <div class="step-nav">
              <button class="btn btn-ghost" onclick="goBack()">← Anterior</button>
              <button class="btn btn-primary" onclick="goNext()">
                ${isLast ? 'Ver resultados →' : 'Siguiente →'}
              </button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function toggleItem(id) {
    if (checked.has(id)) checked.delete(id);
    else                 checked.add(id);
    const card = document.querySelector(`.item-card[data-id="${id}"]`);
    if (card) {
      const on = checked.has(id);
      card.classList.toggle('checked', on);
      card.setAttribute('aria-checked', on);
    }
  }

  function bindStep() {
    document.querySelectorAll('.item-card').forEach(card => {
      card.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          toggleItem(card.dataset.id);
        }
      });
    });
  }

  /* ============================================================
   * SCORE CALCULATION
   * ============================================================ */
  const RING_CIRCUMFERENCE = 326.7;  // 2 * PI * 52

  function calcScore() {
    const maxW  = ITEMS.reduce((s, i) => s + i.weight, 0);
    const earn  = ITEMS.filter(i => checked.has(i.id)).reduce((s, i) => s + i.weight, 0);
    return Math.round((earn / maxW) * 100);
  }

  function riskLevel(pct) {
    if (pct < 30) return { cls: 'critical', txt: 'Riesgo Crítico',  color: '#E63946' };
    if (pct < 60) return { cls: 'high',     txt: 'Riesgo Alto',     color: '#F4A438' };
    if (pct < 80) return { cls: 'medium',   txt: 'Riesgo Medio',    color: '#3B8EFF' };
    return                 { cls: 'low',      txt: 'Bien protegido', color: '#2CB67D' };
  }

  /* ============================================================
   * SCREEN 6 — RESULTS
   * ============================================================ */
  function renderResults() {
    const pct       = calcScore();
    const level     = riskLevel(pct);
    const offset    = RING_CIRCUMFERENCE - (pct / 100) * RING_CIRCUMFERENCE;
    const unchecked = ITEMS.filter(i => !checked.has(i.id));
    const firstName = (userData.name || '').trim().split(/\s+/)[0];

    const waText = `Hola! Hice el checklist de Legal Pacers. Mi score es ${pct}% (${level.txt}). Quisiera agendar una llamada.`;
    const waUrl  = `https://wa.me/5491128774200?text=${encodeURIComponent(waText)}`;

    const subtitle = unchecked.length === 0
      ? '¡Tu startup está bien cubierta! No identificamos riesgos pendientes.'
      : `Identificamos ${unchecked.length} riesgo${unchecked.length !== 1 ? 's' : ''} pendiente${unchecked.length !== 1 ? 's' : ''} de resolver.`;

    const risksBlock = unchecked.length === 0
      ? `<div class="all-clear-card">✓ Sin riesgos identificados. Tu startup está bien cubierta.</div>`
      : `<div class="risks-block">
           <h3>Riesgos identificados (${unchecked.length})</h3>
           <ul class="risks-list">
             ${unchecked.map(i => `
               <li>
                 <strong>${escapeHtml(i.cat)}</strong>
                 ${escapeHtml(i.risk)}
               </li>`).join('')}
           </ul>
         </div>`;

    const ctaHeadline = unchecked.length === 0
      ? '¿Querés una revisión profesional?'
      : '¿Querés cerrar estos riesgos?';

    return `
      <div class="results">
        <div class="results-header">
          <a href="index.html" class="results-logo" aria-label="Legal Pacers — volver al inicio">
            <img src="legalpacers-logos-01.png" alt="Legal Pacers"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'">
            <span class="logo-text">Legal<strong>Pacers</strong></span>
          </a>
          <button class="btn-ghost-light" onclick="restart()">Rehacer</button>
        </div>

        <div class="results-inner">
          <div class="score-display">
            <div class="score-ring-wrap">
              <svg class="score-ring" viewBox="0 0 120 120" aria-hidden="true">
                <circle class="score-ring__bg" cx="60" cy="60" r="52"/>
                <circle class="score-ring__fill" cx="60" cy="60" r="52"
                        style="stroke: ${level.color}; stroke-dashoffset: ${offset.toFixed(1)};"/>
              </svg>
              <div class="score-ring-label">
                <span>${pct}%</span>
                <small>protegido</small>
              </div>
            </div>
            <div class="risk-badge risk-badge--${level.cls}">${level.txt}</div>
          </div>

          <h1 class="results-h1">
            ${firstName ? escapeHtml(firstName) + ', tu' : 'Tu'}
            <span>diagnóstico legal</span>
          </h1>
          <p class="results-subtitle">${subtitle}</p>

          ${risksBlock}

          <div class="disclaimer-box">
            <strong>Importante:</strong> Este score es orientativo. Un puntaje alto no garantiza
            protección completa — lo que importa es la calidad y solidez de cada documento.
            Documentos mal redactados o sin un asesor que los respalde pueden no protegerte
            cuando más lo necesitás.
          </div>

          <div class="cta-box">
            <h3>${ctaHeadline}</h3>
            <p>Agendá una llamada gratuita de 30 minutos. Te decimos cómo resolver cada punto con presupuesto cerrado.</p>
            <a href="${waUrl}" target="_blank" rel="noopener" class="btn btn-primary">
              Agendar llamada gratuita →
            </a>
          </div>
        </div>
      </div>
    `;
  }

  function restart() {
    if (!window.confirm('¿Rehacer el checklist? Se perderán las respuestas actuales.')) return;
    checked.clear();
    direction = 'back';
    currentStep = 1;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  /* ============================================================
   * MAIN RENDER (dispatcher)
   * ============================================================ */
  function render() {
    const app = $app();
    if (currentStep === 0) {
      app.innerHTML = renderGate();
      bindGate();
    } else if (currentStep >= 1 && currentStep <= 5) {
      app.innerHTML = renderStep(currentStep);
      bindStep();
    } else {
      app.innerHTML = renderResults();
    }

    const screen = app.firstElementChild;
    if (screen) {
      screen.classList.add(direction === 'back' ? 'screen-in-left' : 'screen-in-right');
    }
  }

  render();
</script>

</body>
</html>
