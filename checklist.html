<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Evaluá el nivel de riesgo legal de tu startup en 2 minutos — Legal Pacers">
  <title>Checklist de Riesgo Legal — Legal Pacers</title>

  <style>
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialRegular.otf') format('opentype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialBold.otf') format('opentype'); font-weight: 700; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialBlack.otf') format('opentype'); font-weight: 900; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialLight.otf') format('opentype'); font-weight: 300; font-display: swap; }
    @font-face { font-family: 'Mundial'; src: url('TIPOGRAFIA/MundialDemibold.otf') format('opentype'); font-weight: 600; font-display: swap; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --navy: #001540;
      --blue: #016FFB;
      --blue-light: #3B8EFF;
      --blue-glow: rgba(1,111,251,0.15);
      --white: #FFFFFF;
      --off-white: #F4F6FA;
      --gray-100: #E8ECF4;
      --gray-300: #A0AABF;
      --gray-500: #5A6478;
      --gray-700: #2D3447;
      --red: #E63946;
      --green: #2CB67D;
      --amber: #F4A438;
      --radius-sm: 6px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-pill: 999px;
      --shadow-card: 0 4px 24px rgba(0,0,0,0.10);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.3);
      --transition: 200ms ease;
    }

    body {
      font-family: 'Mundial', system-ui, sans-serif;
      background: var(--navy);
      color: var(--gray-700);
      line-height: 1.6;
      font-weight: 400;
      min-height: 100vh;
    }

    a { color: var(--blue); text-decoration: none; }
    button { font-family: inherit; }

    /* APP CONTAINER */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.75rem;
      border-radius: var(--radius-pill);
      font-family: 'Mundial', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
      white-space: nowrap;
      text-decoration: none;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 16px rgba(1,111,251,0.35);
    }
    .btn-primary:hover:not(:disabled) { background: var(--blue-light); }
    .btn-ghost {
      background: transparent;
      color: var(--gray-500);
    }
    .btn-ghost:hover { color: var(--navy); transform: translateY(-2px); }
    .btn-full { width: 100%; }

    /* SCREEN 0 — GATE */
    .gate {
      flex: 1;
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .gate-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .gate-logo { margin-bottom: 1.75rem; }
    .gate-logo img { height: 42px; width: auto; }
    .gate-logo .logo-text {
      font-size: 1.3rem;
      color: var(--navy);
      font-weight: 900;
      display: none;
    }
    .gate-card h1 {
      font-size: 1.65rem;
      font-weight: 900;
      color: var(--navy);
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }
    .gate-card h1 span { color: var(--blue); }
    .gate-card .gate-subtitle {
      color: var(--gray-500);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.55;
    }
    .gate-form { display: flex; flex-direction: column; gap: 0.85rem; }
    .input-field {
      padding: 0.95rem 1.1rem;
      border: 1.5px solid var(--gray-100);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--gray-700);
      background: var(--off-white);
      transition: border-color var(--transition), background var(--transition);
      width: 100%;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--white);
    }
    .input-error {
      color: var(--red);
      font-size: 0.8rem;
      text-align: left;
      margin-top: -0.35rem;
      min-height: 1rem;
    }
    .gate-legal {
      font-size: 0.75rem;
      color: var(--gray-300);
      margin-top: 1.25rem;
      line-height: 1.5;
    }
    .gate-legal a { color: var(--gray-500); text-decoration: underline; }

    /* PLACEHOLDER (temporal hasta Parte 2) */
    .placeholder {
      flex: 1;
      min-height: 100vh;
      background: var(--off-white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
      gap: 1.5rem;
    }
    .placeholder h2 {
      color: var(--navy);
      font-size: 1.5rem;
      font-weight: 900;
    }
    .placeholder p { color: var(--gray-500); max-width: 420px; }
    .placeholder-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

    /* WHATSAPP FLOAT */
    .whatsapp-float {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #25D366;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
      transition: transform var(--transition);
    }
    .whatsapp-float:hover { transform: scale(1.1); color: #fff; }
    .whatsapp-float svg { width: 28px; height: 28px; }

    /* MOBILE */
    @media (max-width: 600px) {
      .gate-card { padding: 2.25rem 1.5rem; }
      .gate-card h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<a href="https://wa.me/5491128774200?text=Hola!%20Quisiera%20consultar%20sobre%20asesor%C3%ADa%20legal%20para%20mi%20startup"
   class="whatsapp-float" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-3.825 3.113-6.937 6.937-6.937 1.856.001 3.598.723 4.907 2.034 1.31 1.311 2.031 3.054 2.03 4.908-.001 3.825-3.113 6.938-6.937 6.938z"/>
  </svg>
</a>

<script>
  /* ============================================================
   * DATA — mismas categorías e ítems del checklist original
   * ============================================================ */
  const CATS = [
    { name:'Constitución',          icon:'🏗️', step:1 },
    { name:'Propiedad Intelectual', icon:'🔐', step:2 },
    { name:'Privacidad y Datos',    icon:'📋', step:3 },
    { name:'Laboral y Contratos',   icon:'👥', step:4 },
    { name:'Inversión',             icon:'📈', step:5 },
  ];

  const ITEMS = [
    { id:'c1',  step:1, cat:'Constitución',          text:'Tengo una sociedad legalmente constituida',                                       risk:'Responsabilidad ilimitada sobre tu patrimonio personal', weight:2 },
    { id:'c2',  step:1, cat:'Constitución',          text:'La estructura es adecuada para recibir inversión extranjera',                      risk:'Inversores no pueden entrar a la sociedad',              weight:3 },
    { id:'c3',  step:1, cat:'Constitución',          text:'Existe un pacto de socios / SHA firmado',                                          risk:'Conflicto entre socios sin mecanismo de resolución',     weight:3 },
    { id:'c4',  step:1, cat:'Constitución',          text:'El vesting de los founders está documentado',                                      risk:'Un socio puede irse con equity sin haber trabajado',     weight:3 },
    { id:'ip1', step:2, cat:'Propiedad Intelectual', text:'El código y la marca están a nombre de la empresa (no del founder)',               risk:'IP personal bloquea cualquier due diligence',            weight:3 },
    { id:'ip2', step:2, cat:'Propiedad Intelectual', text:'Los contratos con freelancers/empleados incluyen cesión de IP',                    risk:'IP de terceros dentro de tu producto',                   weight:3 },
    { id:'ip3', step:2, cat:'Propiedad Intelectual', text:'La marca está registrada o en proceso',                                            risk:'Terceros pueden usar tu marca sin consecuencias',        weight:2 },
    { id:'ip4', step:2, cat:'Propiedad Intelectual', text:'No usás código open source con licencias restrictivas (GPL) sin análisis',         risk:'Contaminación de licencia que afecta al producto',       weight:2 },
    { id:'p1',  step:3, cat:'Privacidad y Datos',    text:'Tenés Términos y Condiciones propios (no copiados de otro servicio)',              risk:'Sin defensa contractual ante reclamos de usuarios',      weight:2 },
    { id:'p2',  step:3, cat:'Privacidad y Datos',    text:'Tenés Política de Privacidad actualizada (LPDP / GDPR)',                           risk:'Multas y sanciones regulatorias',                        weight:3 },
    { id:'p3',  step:3, cat:'Privacidad y Datos',    text:'Tenés mecanismo de consentimiento para cookies y datos',                           risk:'Incumplimiento regulatorio desde el día 1',              weight:2 },
    { id:'p4',  step:3, cat:'Privacidad y Datos',    text:'Los datos de usuarios están alojados conforme a la normativa aplicable',           risk:'Transferencia internacional no autorizada',              weight:2 },
    { id:'l1',  step:4, cat:'Laboral y Contratos',   text:'Los empleados y contratistas tienen contratos firmados',                           risk:'Pasivo laboral oculto que aparece al crecer',            weight:2 },
    { id:'l2',  step:4, cat:'Laboral y Contratos',   text:'Los contratos con clientes incluyen cláusulas de limitación de responsabilidad',   risk:'Responsabilidad ilimitada ante cualquier incidente',     weight:3 },
    { id:'l3',  step:4, cat:'Laboral y Contratos',   text:'Los NDAs con partners y empleados están vigentes',                                 risk:'Filtración de información sin consecuencias legales',    weight:2 },
    { id:'i1',  step:5, cat:'Inversión',             text:'Tenés un cap table actualizado y documentado',                                     risk:'Disputas de equity con inversores actuales o futuros',   weight:2 },
    { id:'i2',  step:5, cat:'Inversión',             text:'Entendés la diferencia entre SAFE, convertible note y equity round',               risk:'Dilución inesperada en tu próxima ronda',                weight:2 },
  ];

  /* ============================================================
   * STATE
   * ============================================================ */
  let currentStep = 0;                    // 0 = gate, 1-5 = pasos, 6 = resultados
  let userData    = { name: '', email: '' };
  const checked   = new Set();

  /* ============================================================
   * HELPERS
   * ============================================================ */
  const $app = () => document.getElementById('app');

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
  }

  /* ============================================================
   * NAVIGATION
   * ============================================================ */
  function goNext() {
    if (currentStep < 6) currentStep++;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  function goBack() {
    if (currentStep > 0) currentStep--;
    render();
    window.scrollTo({ top: 0, behavior: 'instant' });
  }

  /* ============================================================
   * SCREEN 0 — GATE (nombre + email)
   * ============================================================ */
  function renderGate() {
    return `
      <div class="gate">
        <div class="gate-card">
          <div class="gate-logo">
            <img src="legalpacers-logos-01.png" alt="Legal Pacers"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'">
            <span class="logo-text">Legal<strong>Pacers</strong></span>
          </div>

          <h1>Tu <span>diagnóstico legal</span> en 2 minutos</h1>
          <p class="gate-subtitle">
            Respondé 17 preguntas rápidas y descubrí los riesgos legales
            que más impactan a tu startup.
          </p>

          <form class="gate-form" id="gateForm" novalidate>
            <input
              type="text"
              id="gateName"
              class="input-field"
              placeholder="Tu nombre"
              autocomplete="given-name"
              value="${escapeHtml(userData.name)}"
              required>

            <input
              type="email"
              id="gateEmail"
              class="input-field"
              placeholder="Tu email"
              autocomplete="email"
              value="${escapeHtml(userData.email)}"
              required>

            <div class="input-error" id="gateError"></div>

            <button type="submit" class="btn btn-primary btn-full">
              Empezar el diagnóstico →
            </button>
          </form>

          <p class="gate-legal">
            Al continuar aceptás recibir el resultado por email. No te vamos a spamear.
          </p>
        </div>
      </div>
    `;
  }

  function bindGate() {
    const form  = document.getElementById('gateForm');
    const nameI = document.getElementById('gateName');
    const mailI = document.getElementById('gateEmail');
    const errEl = document.getElementById('gateError');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name  = nameI.value.trim();
      const email = mailI.value.trim();

      if (!name) { errEl.textContent = 'Ingresá tu nombre.'; nameI.focus(); return; }
      if (!isValidEmail(email)) { errEl.textContent = 'Ingresá un email válido.'; mailI.focus(); return; }

      userData.name  = name;
      userData.email = email;
      errEl.textContent = '';
      goNext();
    });

    setTimeout(() => nameI.focus(), 50);
  }

  /* ============================================================
   * PLACEHOLDER — pantallas 1-6 (se completan en Partes 2 y 3)
   * ============================================================ */
  function renderPlaceholder() {
    const label = currentStep === 6 ? 'Resultados' : `Paso ${currentStep} de 5`;
    return `
      <div class="placeholder">
        <h2>${label}</h2>
        <p>Hola <strong>${escapeHtml(userData.name) || 'founder'}</strong>, esta pantalla se construye en la próxima entrega.</p>
        <div class="placeholder-actions">
          <button class="btn btn-ghost" onclick="goBack()">← Anterior</button>
          ${currentStep < 6 ? '<button class="btn btn-primary" onclick="goNext()">Siguiente →</button>' : ''}
        </div>
      </div>
    `;
  }

  /* ============================================================
   * MAIN RENDER
   * ============================================================ */
  function render() {
    const app = $app();
    if (currentStep === 0)       app.innerHTML = renderGate();
    else                          app.innerHTML = renderPlaceholder();

    if (currentStep === 0) bindGate();
  }

  render();
</script>

</body>
</html>
